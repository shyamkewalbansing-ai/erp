        <!-- PWA Manifest & Icons - dynamisch per route gekozen VÓÓR eerste render -->
        <script>
            (function() {
                var p = window.location.pathname;
                var isVastgoed = p.indexOf('/vastgoed') === 0;
                var isHuurders = p.indexOf('/huurders') === 0;
                var isKiosk = isVastgoed || isHuurders;

                var v = '2026-02-24';  // cache-bust voor iOS apple-touch-icon

                var manifest = '/manifest.json';
                var favicon = '/favicon.ico';
                var icon32 = '/icons/icon-96x96.png';
                var icon16 = '/icons/icon-72x72.png';
                var appleIcon = '/icons/apple-touch-icon.png';
                var apple152 = '/icons/icon-152x152.png';
                var apple180 = '/icons/icon-192x192.png';
                var apple167 = '/icons/icon-192x192.png';
                var themeColor = '#0caf60';
                var appleTitle = 'Facturatie';

                if (isVastgoed) {
                    manifest = '/manifest-vastgoed.json';
                    appleTitle = 'Kiosk';
                    document.title = 'Vastgoed Kiosk';
                    themeColor = '#f97316';
                } else if (isHuurders) {
                    manifest = '/manifest-huurders.json';
                    appleTitle = 'Huurders';
                    document.title = 'Huurders Portaal';
                    themeColor = '#f97316';
                }

                if (isKiosk) {
                    favicon = '/kiosk-icons/kiosk-favicon.ico';
                    icon32 = '/kiosk-icons/kiosk-72.png';
                    icon16 = '/kiosk-icons/kiosk-72.png';
                    appleIcon = '/kiosk-icons/kiosk-192.png';
                    apple152 = '/kiosk-icons/kiosk-144.png';
                    apple180 = '/kiosk-icons/kiosk-192.png';
                    apple167 = '/kiosk-icons/kiosk-192.png';
                }

                function addLink(rel, href, attrs) {
                    var l = document.createElement('link');
                    l.rel = rel;
                    l.href = href + (href.indexOf('?') >= 0 ? '&' : '?') + 'v=' + v;
                    if (attrs) Object.keys(attrs).forEach(function(k) { l.setAttribute(k, attrs[k]); });
                    document.head.appendChild(l);
                }

                addLink('manifest', manifest);
                addLink('icon', favicon, { type: 'image/x-icon' });
                addLink('icon', icon32, { type: 'image/png', sizes: '32x32' });
                addLink('icon', icon16, { type: 'image/png', sizes: '16x16' });
                addLink('apple-touch-icon', appleIcon);
                addLink('apple-touch-icon', apple152, { sizes: '152x152' });
                addLink('apple-touch-icon', apple180, { sizes: '180x180' });
                addLink('apple-touch-icon', apple167, { sizes: '167x167' });

                // Theme color + apple title
                var mTheme = document.querySelector('meta[name="theme-color"]');
                if (mTheme) mTheme.content = themeColor;
                var mAppleTitle = document.querySelector('meta[name="apple-mobile-web-app-title"]');
                if (mAppleTitle) mAppleTitle.content = appleTitle;
                var mAppName = document.querySelector('meta[name="application-name"]');
                if (mAppName && isKiosk) mAppName.content = appleTitle;
            })();
        </script>

        <!-- Online/Offline status tracking -->
        <script>
            // Check online status - SW registration is handled in index.js
            function updateOnlineStatus() {
                const isOnline = navigator.onLine;
                document.body.classList.toggle('is-offline', !isOnline);
            }
            window.addEventListener('online', updateOnlineStatus);
            window.addEventListener('offline', updateOnlineStatus);
            updateOnlineStatus();
            
            // Listen for SW messages
