        <!-- PWA Manifest & Icons - dynamisch per route gekozen VÓÓR eerste render -->
        <script>
            (function() {
                var p = window.location.pathname;
                var host = window.location.hostname;
                var isVastgoedPath = p.indexOf('/vastgoed') === 0;
                var isHuurdersPath = p.indexOf('/huurders') === 0;

                // Detect custom domain: not facturatie.sr, niet preview, niet localhost
                var mainDomains = ['facturatie.sr', 'www.facturatie.sr', 'app.facturatie.sr', 'localhost', '127.0.0.1'];
                var isMainDomain = mainDomains.indexOf(host) >= 0
                    || host.indexOf('.preview.emergentagent.com') >= 0
                    || host.endsWith('.facturatie.sr');
                var isCustomKioskDomain = !isMainDomain;

                var isKiosk = isVastgoedPath || isHuurdersPath || isCustomKioskDomain;

                var v = '2026-02-24';  // cache-bust voor iOS apple-touch-icon

                var manifest = '/manifest.json';
                var favicon = '/favicon.ico';
                var icon32 = '/icons/icon-96x96.png';
                var icon16 = '/icons/icon-72x72.png';
                var appleIcon = '/icons/apple-touch-icon.png';
                var apple152 = '/icons/icon-152x152.png';
                var apple180 = '/icons/icon-192x192.png';
                var apple167 = '/icons/icon-192x192.png';
                var themeColor = '#0caf60';
                var appleTitle = 'Facturatie';

                if (isVastgoedPath || isCustomKioskDomain) {
                    manifest = isCustomKioskDomain ? '/manifest-kiosk-custom.json' : '/manifest-vastgoed.json';
                    appleTitle = 'Kiosk';
                    document.title = 'Vastgoed Kiosk';
                    themeColor = '#f97316';
                } else if (isHuurdersPath) {
                    manifest = '/manifest-huurders.json';
                    appleTitle = 'Huurders';
                    document.title = 'Huurders Portaal';
                    themeColor = '#f97316';
                }

                if (isKiosk) {
                    favicon = '/kiosk-icons/kiosk-favicon.ico';
                    icon32 = '/kiosk-icons/kiosk-72.png';
                    icon16 = '/kiosk-icons/kiosk-72.png';
                    appleIcon = '/kiosk-icons/kiosk-192.png';
                    apple152 = '/kiosk-icons/kiosk-144.png';
                    apple180 = '/kiosk-icons/kiosk-192.png';
                    apple167 = '/kiosk-icons/kiosk-192.png';
                }

                function addLink(rel, href, attrs) {
                    var l = document.createElement('link');
                    l.rel = rel;
                    l.href = href + (href.indexOf('?') >= 0 ? '&' : '?') + 'v=' + v;
                    if (attrs) Object.keys(attrs).forEach(function(k) { l.setAttribute(k, attrs[k]); });
                    document.head.appendChild(l);
                }

                addLink('manifest', manifest);
                addLink('icon', favicon, { type: 'image/x-icon' });
                addLink('icon', icon32, { type: 'image/png', sizes: '32x32' });
                addLink('icon', icon16, { type: 'image/png', sizes: '16x16' });
                addLink('apple-touch-icon', appleIcon);
                addLink('apple-touch-icon', apple152, { sizes: '152x152' });
                addLink('apple-touch-icon', apple180, { sizes: '180x180' });
                addLink('apple-touch-icon', apple167, { sizes: '167x167' });

                // iOS splash screens (branded oranje met huis-logo) voor Kiosk PWAs
                if (isKiosk) {
                    var splashes = [
                        // iPad Pro 12.9"
                        { w: 2048, h: 2732, dpr: 2, orient: 'portrait', f: 'ipad-pro-12-portrait.png' },
                        { w: 2732, h: 2048, dpr: 2, orient: 'landscape', f: 'ipad-pro-12-landscape.png' },
                        // iPad Pro 11"
                        { w: 1668, h: 2388, dpr: 2, orient: 'portrait', f: 'ipad-pro-11-portrait.png' },
                        { w: 2388, h: 1668, dpr: 2, orient: 'landscape', f: 'ipad-pro-11-landscape.png' },
                        // iPad
                        { w: 1536, h: 2048, dpr: 2, orient: 'portrait', f: 'ipad-portrait.png' },
                        { w: 2048, h: 1536, dpr: 2, orient: 'landscape', f: 'ipad-landscape.png' },
                        // iPhone 15/14 Pro Max (430x932 @3x)
                        { w: 1290, h: 2796, dpr: 3, orient: 'portrait', f: 'iphone-15-promax-portrait.png' },
                        { w: 2796, h: 1290, dpr: 3, orient: 'landscape', f: 'iphone-15-promax-landscape.png' },
                        // iPhone 15/14 Pro (393x852 @3x)
                        { w: 1179, h: 2556, dpr: 3, orient: 'portrait', f: 'iphone-15-pro-portrait.png' },
                        { w: 2556, h: 1179, dpr: 3, orient: 'landscape', f: 'iphone-15-pro-landscape.png' },
                        // iPhone 13/14 (390x844 @3x)
                        { w: 1170, h: 2532, dpr: 3, orient: 'portrait', f: 'iphone-13-portrait.png' },
                        { w: 2532, h: 1170, dpr: 3, orient: 'landscape', f: 'iphone-13-landscape.png' },
                        // iPhone X/XS/11Pro (375x812 @3x)
                        { w: 1125, h: 2436, dpr: 3, orient: 'portrait', f: 'iphone-x-portrait.png' },
                        { w: 2436, h: 1125, dpr: 3, orient: 'landscape', f: 'iphone-x-landscape.png' },
                        // iPhone XS Max / 11 Pro Max (414x896 @3x)
                        { w: 1242, h: 2688, dpr: 3, orient: 'portrait', f: 'iphone-xs-max-portrait.png' },
                        { w: 2688, h: 1242, dpr: 3, orient: 'landscape', f: 'iphone-xs-max-landscape.png' },
                        // iPhone XR / 11 (414x896 @2x)
                        { w: 828, h: 1792, dpr: 2, orient: 'portrait', f: 'iphone-xr-portrait.png' },
                        { w: 1792, h: 828, dpr: 2, orient: 'landscape', f: 'iphone-xr-landscape.png' },
                        // iPhone 6/7/8/SE (375x667 @2x)
                        { w: 750, h: 1334, dpr: 2, orient: 'portrait', f: 'iphone-8-portrait.png' },
                        { w: 1334, h: 750, dpr: 2, orient: 'landscape', f: 'iphone-8-landscape.png' }
                    ];
                    splashes.forEach(function(s) {
                        var l = document.createElement('link');
                        l.rel = 'apple-touch-startup-image';
                        l.href = '/kiosk-icons/splash/' + s.f + '?v=' + v;
                        var cssW = Math.round(s.w / s.dpr);
                        var cssH = Math.round(s.h / s.dpr);
                        l.media = '(device-width: ' + cssW + 'px) and (device-height: ' + cssH + 'px) and (-webkit-device-pixel-ratio: ' + s.dpr + ') and (orientation: ' + s.orient + ')';
                        document.head.appendChild(l);
                    });
                }

                // Theme color + apple title
                var mTheme = document.querySelector('meta[name="theme-color"]');
                if (mTheme) mTheme.content = themeColor;
                var mAppleTitle = document.querySelector('meta[name="apple-mobile-web-app-title"]');
                if (mAppleTitle) mAppleTitle.content = appleTitle;
                var mAppName = document.querySelector('meta[name="application-name"]');
                if (mAppName && isKiosk) mAppName.content = appleTitle;

                // For kiosk routes: orange body background + black-translucent status bar
                // This ensures the iOS status bar area stays orange consistently,
                // and Android browser chrome stays orange via theme-color.
                if (isKiosk) {
                    var mSbStyle = document.querySelector('meta[name="apple-mobile-web-app-status-bar-style"]');
                    if (mSbStyle) mSbStyle.content = 'black-translucent';
                    // Apply orange body background so it shows through translucent status bar
                    // Also ensures scroll-bounce top shows orange instead of white.
                    document.documentElement.classList.add('kiosk-orange-statusbar');
                    document.documentElement.style.background = themeColor;
                    document.addEventListener('DOMContentLoaded', function() {
                        document.body.classList.add('kiosk-orange-statusbar');
                    });
                }
            })();
        </script>

        <!-- Critical CSS for initial render -->
        <style>
            body { margin: 0; font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
            #root { min-height: 100vh; }
            .initial-loader { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
            .initial-loader::after { content: ''; width: 32px; height: 32px; border: 3px solid #e5e7eb; border-top-color: #0caf60; border-radius: 50%; animation: spin 0.8s linear infinite; }
            @keyframes spin { to { transform: rotate(360deg); } }

            /* Kiosk: keep iOS status bar ALWAYS orange.
               - black-translucent status bar => body background shows through status bar area
               - orange html/body background => status bar renders orange
               - safe-area-inset-top padding on #root => real content starts below status bar
               - fixed orange "top-shield" div so scroll-bounce also shows orange */
            html.kiosk-orange-statusbar,
            body.kiosk-orange-statusbar {
                background: #f97316 !important;
            }
            body.kiosk-orange-statusbar::before {
                content: '';
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                height: env(safe-area-inset-top, 0px);
                background: #f97316;
                z-index: 2147483647;
                pointer-events: none;
            }
            body.kiosk-orange-statusbar #root {
                padding-top: env(safe-area-inset-top, 0px);
                box-sizing: border-box;
                min-height: 100vh;
                min-height: 100dvh;
                background: #f1f5f9;
            }
            /* Push modal backdrops below the orange status-bar shield so modal content is visible */
            @media (max-width: 639px) {
                body.kiosk-orange-statusbar .fixed.inset-0 {
                    padding-top: env(safe-area-inset-top, 0px);
                }
            }
        </style>

        <!-- Online/Offline status tracking -->
        <script>
            // Check online status - SW registration is handled in index.js
            function updateOnlineStatus() {
                const isOnline = navigator.onLine;
                document.body.classList.toggle('is-offline', !isOnline);
            }
            window.addEventListener('online', updateOnlineStatus);
            window.addEventListener('offline', updateOnlineStatus);
            updateOnlineStatus();
            
            // Listen for SW messages
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.addEventListener('message', function(event) {
                    if (event.data && event.data.type === 'TRIGGER_SYNC') {
                        window.dispatchEvent(new CustomEvent('sw-sync'));
                    }
                });
            }
